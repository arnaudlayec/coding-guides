services:
  # ...
  saxon-server:
    restart: always
    image: ghcr.io/willemvlh/saxon-server:latest
    container_name: saxon-server
    environment:
      - JAVA_OPTS=-Xmx1g
    command: ["java", "-jar", "app.jar", "--insecure"]
    networks:
      - local
  # ...
  odoo:
    # ...
    links:
      # ...
      - saxon-server
