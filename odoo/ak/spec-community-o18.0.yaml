l10n-france:
  modules:
    - account_payment_fr_lcr # generate CFONB for French Letters of Change : Lettre de change Directe (LCR directe), Lettre de change Acceptée (+ .PDF), Billet à ordre.
    - account_statement_import_fr_cfonb # import the text-based France-specific CFONB bank statements files in Odoo (multi-account CFONB supported since v14)
    - country_fr # must be installed before `account`. Set FR country on partner `base.main_company` which applies French Chart of Account to main company when installed before `account`
    - l10n_fr_account_invoice_facturx # implements the France-specific part of the Factur-X standard to generate Factur-X invoices. In particular, it adds the SIRET of the buyer and the seller in the XML file embedded in the PDF invoice
    # - l10n_fr_account_oca # PR 628 - provides the chart of accounts, taxes and fiscal positions (except DOM-TOMs)
    - l10n_fr_account_payment_intl_credit_transfer
    - l10n_fr_account_tax_unece # auto-configure the parameters UNECE Tax Type and UNECE Tax Category on taxes defined in the l10n_fr module
    # - l10n_fr_account_vat_return # (conflict) PR 629 - support for the French VAT declaration CA3 (monthly or quarterly) -> boxes of CA3 form, print in PDF, corresponding journal entries. Also for CA12 (smaller companies) but manual recopy in impots.gouv.fr. Also supports reimbursment of VAT credit (3519) and additional taxes (3310-A)
    # - l10n_fr_account_vat_return_teledec # (conflict) PR 629 - EDI teletransmission to teledec.fr
    - l10n_fr_chorus_account # base for chorus: partners configuration and technical settings
    - l10n_fr_chorus_facturx # performs checks and generate facture-x invoices for Chorus
    - l10n_fr_chorus_sale # performs checks at SO. Is an extension of `l10n_fr_chorus_account`
    - l10n_fr_cog # adds the Code Officiel Géographique of INSEE on countries. All countries except France and DOM-TOMs (and some very particular territories) have this code
    - l10n_fr_das2 # Déclaration d'honoraires (vacations, commissions, courtage, ristournes et jetons)
    - l10n_fr_department # creates a new model res_country_department, sub division of the res_country_state and populate it with all the french departments, but only the french departments of mainland
    - l10n_fr_department_oversea
    - l10n_fr_hr_check_ssnid # check the social security number of employees of French companies: if the length or checksum is wrong, an error message will be displayed
    - l10n_fr_intrastat_product # EMEBDI (Enquête mensuelle statistique sur les échanges de biens intra-UE). Formerly DEB before 2022 (Déclaration d'Échange de Biens)
    - l10n_fr_intrastat_service # Déclaration Européenne des Services (DES), when selling services without VAT to other EU companies
    # - l10n_fr_mis_reports # PR 665 - MIS Builder Report templates for the French P&L and Balance Sheet taking the liasse fiscale and liasse fiscale simplifiée
    - l10n_fr_pos_caisse_ap_ip
    - l10n_fr_siret # validate SIRET (checksum, SIREN+NIC, warning-banner if duplicate)
    - l10n_fr_siret_account # glue
    # - l10n_fr_siret_lookup # PR 579 - updates partner fields via the SIRENE database
    - l10n_fr_state # populate the table res_country_state with the french states (Régions françaises)
    # v16.0 max as of 07-07-2025:
    # - account_balance_ebp_csv_export # export the Trial Balance in the CSV export format of the EBP accounting software, in the Trial Balance wizard (e.g. export to SAGE)
    # - l10n_fr_account_vat_return_einvoice_generate # glue
    # - l10n_fr_department_product_origin # extends the functionality of Product Origin module to add french department on products
    # - l10n_fr_fec_oca # permet de générer le fichier FEC tel que définit par l'arrêté du 29 Juillet 2013
    # - l10n_fr_pos_cert_update_draft_order_line
  src: https://github.com/oca/l10n-france 18.0
